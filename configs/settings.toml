[datasets.rfp.staffing]
always_roles = ["Project Manager"]
max_per_role = 4

role_weights = { "Solution Architect" = 1.2, "Backend Engineer" = 1.4, "Frontend Engineer" = 1.2, "DevOps Engineer" = 1.1, "QA Engineer" = 1.0, "Data Engineer" = 1.1, "ML Engineer" = 1.1, "Business Analyst" = 1.0, "DBA" = 0.9 }
seniority_weights = { "mid" = 0.45, "senior" = 0.40, "lead" = 0.10, "junior" = 0.05 }

[[datasets.rfp.staffing.role_sets]]
name = "default"
match_keywords = []
